apiVersion: apps/v1
kind: Deployment
metadata:
  name: feature-store-api
  namespace: ml-platform
spec:
  replicas: 3
  selector:
    matchLabels:
      app: feature-store-api
  template:
    metadata:
      labels:
        app: feature-store-api
    spec:
      containers:
        - name: feature-store-api
          image: registry.ml-platform.internal/feature-store-api:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "4"
              memory: 8Gi
          envFrom:
            - configMapRef:
                name: feature-store-config
            - secretRef:
                name: feature-store-secrets
          volumeMounts:
            - name: tls-certs
              mountPath: /etc/tls
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
      volumes:
        - name: tls-certs
          secret:
            secretName: feature-store-tls
---
apiVersion: v1
kind: Service
metadata:
  name: feature-store-api
  namespace: ml-platform
spec:
  type: ClusterIP
  selector:
    app: feature-store-api
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: feature-store-api-hpa
  namespace: ml-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: feature-store-api
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
