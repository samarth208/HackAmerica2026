# Strimzi KafkaTopic CRDs — AMD ML Platform
# All topics belong to cluster: amd-ml-kafka
# Apply with: kubectl apply -f topics.yaml -n kafka
#
# Partition sizing rationale:
#   Target max lag < 10s at peak throughput.
#   Each partition consumer assumed ~500 msg/s sustained read capacity.
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# Topic: raw.gpu.telemetry
# Throughput: 4000 msg/s, avg 512 bytes (~2 MB/s ingress)
# Consumer groups: flink-alert-enrichment, delta-sink-gpu
# Partitions: 64 — allows 8 parallel consumers per group with headroom
# Retention: 1 day (high-volume, processed downstream quickly)
# Compression: lz4 (low-latency GPU metrics; overrides global default zstd)
# ---------------------------------------------------------------------------
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: raw.gpu.telemetry
  namespace: kafka
  labels:
    strimzi.io/cluster: amd-ml-kafka
spec:
  partitions: 64
  replicas: 3
  config:
    retention.ms: "86400000"
    compression.type: "lz4"
    max.message.bytes: "1048576"
    min.insync.replicas: "2"
    cleanup.policy: "delete"
    segment.ms: "3600000"

---
# ---------------------------------------------------------------------------
# Topic: raw.kubernetes.events
# Throughput: 200 msg/s, avg 2KB (~400 KB/s ingress)
# Consumer groups: flink-alert-enrichment, ontology-sync
# Partitions: 16 — adequate for 200 msg/s; 2 consumer groups run in parallel
# Retention: 7 days (default cluster retention)
# Compression: zstd (default)
# ---------------------------------------------------------------------------
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: raw.kubernetes.events
  namespace: kafka
  labels:
    strimzi.io/cluster: amd-ml-kafka
spec:
  partitions: 16
  replicas: 3
  config:
    retention.ms: "604800000"
    compression.type: "zstd"
    max.message.bytes: "10485760"
    min.insync.replicas: "2"
    cleanup.policy: "delete"
    segment.ms: "3600000"

