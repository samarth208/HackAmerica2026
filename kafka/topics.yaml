---
# ---------------------------------------------------------------------------
# Topic: processed.training.corpus
# Throughput: 500 msg/s, avg 4KB (~2 MB/s ingress)
# Consumer groups: delta-sink-corpus, quality-monitor
# Partitions: 32 — key-compacted corpus; parallelism for large-payload sinks
# Retention: 90 days (7776000000 ms) with compaction — latest value per key kept indefinitely
# Compression: zstd (best ratio for large structured corpus records)
# cleanup.policy=compact: retains latest record per message key (corpus deduplication)
# ---------------------------------------------------------------------------
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: processed.training.corpus
  namespace: kafka
  labels:
    strimzi.io/cluster: amd-ml-kafka
spec:
  partitions: 32
  replicas: 3
  config:
    retention.ms: "7776000000"
    cleanup.policy: "compact"
    compression.type: "zstd"
    max.message.bytes: "10485760"
    min.insync.replicas: "2"
    min.cleanable.dirty.ratio: "0.1"
    segment.ms: "86400000"

